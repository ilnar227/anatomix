# Render Blueprint: https://render.com/docs/blueprint-spec
# New → Blueprint → connect repo → Render reads this file (or paste contents).

databases:
  - name: anatomix-db
    databaseName: anatomix
    user: anatomix
    plan: free

services:
  - type: web
    name: anatomix-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: anatomix-db
          property: connectionString
      # Set CORS_ORIGIN in the Render dashboard to your deployed frontend URL.
